<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="DJ silhouette with amber rim light">
  <defs>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C79A4B" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#C79A4B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- stage light glow -->
  <circle cx="300" cy="280" r="260" fill="url(#rim)"/>
  <!-- DJ silhouette: shoulders + head + headphones -->
  <g fill="#0E0B0A">
    <!-- shoulders / torso -->
    <path d="M120 600 C 140 460, 200 410, 300 410 C 400 410, 460 460, 480 600 Z"/>
    <!-- head -->
    <ellipse cx="300" cy="320" rx="92" ry="108"/>
    <!-- hair tuft -->
    <path d="M214 282 C 220 220, 280 200, 300 200 C 320 200, 380 220, 386 282 C 360 256, 320 250, 300 252 C 280 250, 240 256, 214 282 Z"/>
    <!-- headphones band -->
    <path d="M214 286 C 220 224, 280 208, 300 208 C 320 208, 380 224, 386 286" fill="none" stroke="#0E0B0A" stroke-width="14"/>
    <!-- left + right earcups -->
    <rect x="196" y="276" width="34" height="46" rx="8"/>
    <rect x="370" y="276" width="34" height="46" rx="8"/>
  </g>
  <!-- amber rim accent on shoulder -->
  <path d="M120 600 C 140 460, 200 410, 300 410 C 400 410, 460 460, 480 600" fill="none" stroke="#C79A4B" stroke-width="3" stroke-opacity=".5"/>
  <!-- blood microphone hint in lower area -->
  <g transform="translate(420,520) rotate(-12)">
    <rect x="0" y="0" width="14" height="60" fill="#0E0B0A"/>
    <circle cx="7" cy="-8" r="14" fill="#B5221A"/>
    <circle cx="7" cy="-8" r="6" fill="#0E0B0A"/>
  </g>
  <!-- subtle smoke wisps -->
  <g stroke="#E9E0CE" stroke-width="1.5" fill="none" opacity=".18">
    <path d="M80 180 C 140 160, 200 200, 240 180"/>
    <path d="M360 120 C 420 100, 480 140, 520 120"/>
    <path d="M40 460 C 100 440, 160 480, 200 460"/>
  </g>
</svg>
