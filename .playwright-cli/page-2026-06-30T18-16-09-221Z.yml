        - generic [ref=e105]: XVII · a estrela
        - heading "A Estrela" [level=2] [ref=e106]
        - paragraph [ref=e107]: A esperança fria, a luz distante que guia o fim da noite. Um lampejo de clareza em meio à neblina da pista. O prenúncio do amanhecer.
      - generic [ref=e108]: lampejo · clareza
