        - heading "A Lua" [level=2] [ref=e113]
        - paragraph [ref=e114]: O inconsciente, os medos, os reflexos que brilham no escuro. A verdade não está na superfície, mas na sombra que ela projeta.
      - generic [ref=e115]: sombra · reflexo
    - article [ref=e116]:
