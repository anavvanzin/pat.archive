      - generic [ref=e97]:
        - generic [ref=e98]: XVI · a torre
        - heading "A Torre" [level=2] [ref=e99]
        - paragraph [ref=e100]: A queda necessária. Tudo o que foi construído sobre bases falsas precisa ruir para que o espaço respire novamente.
      - generic [ref=e101]: ruptura · purificação
    - article [ref=e102]:
