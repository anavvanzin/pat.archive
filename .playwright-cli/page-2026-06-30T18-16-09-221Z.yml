      - generic [ref=e48]:
        - generic [ref=e49]: II · a sacerdotisa
        - heading "A Sacerdotisa" [level=2] [ref=e50]
        - paragraph [ref=e51]: O véu, o saber silencioso, o limiar. O convite é para parar e ouvir a intuição que o barulho da pista geralmente silencia.
      - generic [ref=e52]: limiar · mistério
    - article [ref=e53]:
      - img "A Imperatriz" [ref=e54]
      - generic [ref=e55]:
        - generic [ref=e56]: III · a imperatriz
        - heading "A Imperatriz" [level=2] [ref=e57]
        - paragraph [ref=e58]: A criação abundante, a matéria viva, a força do ateliê. A fertilidade não é passiva; é o ato de dar forma e textura às ideias brutas.
      - generic [ref=e59]: criação · matéria
    - article [ref=e60]:
      - img "O Hierofante" [ref=e61]
      - generic [ref=e62]:
        - generic [ref=e63]: V · o hierofante
        - heading "O Hierofante" [level=2] [ref=e64]
        - paragraph [ref=e65]: A tradição, os rituais antigos, a estrutura invisível. A ordem que protege o caos. O respeito à linhagem e à técnica que precedem o ruído.
      - generic [ref=e66]: estrutura · ritual
    - article [ref=e67]:
      - img "Os Namorados" [ref=e68]
      - generic [ref=e69]:
        - generic [ref=e70]: VI · os namorados
        - heading "Os Namorados" [level=2] [ref=e71]
        - paragraph [ref=e72]: A escolha, a bifurcação das frequências. A sintonia fina entre o ateliê e a pista, onde cada atração exige um sacrifício de caminho.
      - generic [ref=e73]: bifurcação · sintonia
    - article [ref=e74]:
      - img "A Roda da Fortuna" [ref=e75]
      - generic [ref=e76]:
        - generic [ref=e77]: X · a roda da fortuna
        - heading "A Roda da Fortuna" [level=2] [ref=e78]
        - paragraph [ref=e79]: O loop, o compasso que gira sem parar. Altas frequências, baixas frequências. Nada é estático; aprenda a dançar tanto na subida quanto na queda.
      - generic [ref=e80]: loop · compasso
    - article [ref=e81]:
      - img "A Justiça" [ref=e82]
      - generic [ref=e83]:
        - generic [ref=e84]: XI · a justiça
        - heading "A Justiça" [level=2] [ref=e85]
        - paragraph [ref=e86]: A precisão do corte, o equilíbrio estrito. A verdade crua despida de ornamentos. O peso exato de cada escolha no layout ou na mixagem.
      - generic [ref=e87]: corte · precisão
    - article [ref=e88]:
      - img "A Morte" [ref=e89]
      - generic [ref=e90]:
        - generic [ref=e91]: XIII · a morte
        - heading "A Morte" [level=2] [ref=e92]
        - paragraph [ref=e93]: A transformação, o fechamento de ciclo. Nada acaba de verdade; a forma apenas se desfaz para algo novo poder emergir.
      - generic [ref=e94]: transformação · fim/início
    - article [ref=e95]:
