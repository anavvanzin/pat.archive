        - heading "O DJ" [level=2] [ref=e43]
        - paragraph [ref=e44]: O regente das frequências, o controle da tensão. Ele manipula o tempo e a percepção na pista, lembrando que você escolhe a próxima transição.
      - generic [ref=e45]: frequência · controle
    - article [ref=e46]:
