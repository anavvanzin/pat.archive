        - heading "O Sol" [level=2] [ref=e120]
        - paragraph [ref=e121]: A clareza absoluta, o calor da exposição. A luz que reveals todos os segredos do ateliê e dissipa as ilusões da noite. A energia pura do fazer.
      - generic [ref=e122]: exposição · energia
