        - heading "O Mundo" [level=2] [ref=e127]
        - paragraph [ref=e128]: A integração total, a faixa perfeitamente mixada. A fusão do ateliê e da pista. O ciclo completo onde tudo faz sentido e se resolve.
      - generic [ref=e129]: integração · totalidade
