        - heading "A Justiça" [level=2] [ref=e84]
        - paragraph [ref=e85]: A precisão do corte, o equilíbrio estrito. A verdade crua despida de ornamentos. O peso exato de cada escolha no layout ou na mixagem.
      - generic [ref=e86]: corte · precisão
