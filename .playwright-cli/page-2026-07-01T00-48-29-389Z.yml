        - heading "A Roda da Fortuna" [level=2] [ref=e77]
        - paragraph [ref=e78]: O loop, o compasso que gira sem parar. Altas frequências, baixas frequências. Nada é estático; aprenda a dançar tanto na subida quanto na queda.
      - generic [ref=e79]: loop · compasso
