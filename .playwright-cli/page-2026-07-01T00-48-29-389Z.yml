        - heading "A Morte" [level=2] [ref=e91]
        - paragraph [ref=e92]: A transformação, o fechamento de ciclo. Nada acaba de verdade; a forma apenas se desfaz para algo novo poder emergir.
      - generic [ref=e93]: transformação · fim/início
