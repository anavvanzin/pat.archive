        - heading "O Hierofante" [level=2] [ref=e63]
        - paragraph [ref=e64]: A tradição, os rituais antigos, a estrutura invisível. A ordem que protege o caos. O respeito à linhagem e à técnica que precedem o ruído.
      - generic [ref=e65]: estrutura · ritual
