        - generic [ref=e55]: III · a imperatriz
        - heading "A Imperatriz" [level=2] [ref=e56]
        - paragraph [ref=e57]: A criação abundante, a matéria viva, a força do ateliê. A fertilidade não é passiva; é o ato de dar forma e textura às ideias brutas.
      - generic [ref=e58]: criação · matéria
