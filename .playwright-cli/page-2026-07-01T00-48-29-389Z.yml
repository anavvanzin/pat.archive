        - heading "A Lua" [level=2] [ref=e112]
        - paragraph [ref=e113]: O inconsciente, os medos, os reflexos que brilham no escuro. A verdade não está na superfície, mas na sombra que ela projeta.
      - generic [ref=e114]: sombra · reflexo
