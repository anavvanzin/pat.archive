      - generic [ref=e68]:
        - generic [ref=e69]: VI · os namorados
        - heading "Os Namorados" [level=2] [ref=e70]
        - paragraph [ref=e71]: A escolha, a bifurcação das frequências. A sintonia fina entre o ateliê e a pista, onde cada atração exige um sacrifício de caminho.
      - generic [ref=e72]: bifurcação · sintonia
    - article [ref=e73]:
